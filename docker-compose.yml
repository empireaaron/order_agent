version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ticket_bot
      MYSQL_USER: ticket_user
      MYSQL_PASSWORD: ticket_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database.sql:/docker-entrypoint-initdb.d/database.sql
    networks:
      - ticket_network

  milvus:
    image: milvusdb/milvus:latest
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    networks:
      - ticket_network
    depends_on:
      - etcd
      - minio

  etcd:
    image: quay.io/coreos/etcd:v3.5.0
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    volumes:
      - etcd_data:/etcd
    networks:
      - ticket_network

  minio:
    image: minio/minio:RELEASE.2021-02-14T04-01-33Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data
    volumes:
      - minio_data:/minio_data
    networks:
      - ticket_network

  backend:
    build: ./backend
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=ticket_user
      - MYSQL_PASSWORD=ticket_pass
      - MYSQL_DATABASE=ticket_bot
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - JWT_SECRET_KEY=your-secret-key-change-in-production
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - mysql
      - milvus
    networks:
      - ticket_network

  frontend:
    build: ./frontend-admin
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ticket_network

volumes:
  mysql_data:
  etcd_data:
  minio_data:

networks:
  ticket_network:
    driver: bridge